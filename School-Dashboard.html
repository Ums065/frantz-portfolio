document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Display',serif;color:#e7c977;\">{{ t.rank }}<\u002Fdiv>\n                  <div style=\"padding:18px 16px;font:500 15px/1 Manrope;color:#dcded4;\">{{ t.name }}<\u002Fdiv>\n                  <div style=\"padding:14px 16px;\"><span style=\"{{ t.badgeStyle }}\">{{ t.status }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"padding:18px 16px;font:400 14px/1 Manrope;color:#b9bbb2;\">{{ t.students }}<\u002Fdiv>\n                  <div style=\"padding:18px 16px;font:600 14px/1 Manrope;color:#e3bf73;\">{{ t.score }}<\u002Fdiv>\n                  <div style=\"padding:18px 16px;font:400 14px/1 Manrope;color:#b9bbb2;\">{{ t.top }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ isRecInterviews }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"border-radius:18px;border:1px solid rgba(255,255,255,.07);overflow:hidden;\">\n              <div style=\"display:grid;grid-template-columns:1fr 1.2fr .5fr 1.2fr 1fr 2fr;background:rgba(143,224,166,.04);\">\n                <div style=\"font:700 11px/1 Manrope;letter-spacing:.1em;text-transform:uppercase;color:#8fe0a6;padding:16px;\">Participant<\u002Fdiv><div style=\"font:700 11px/1 Manrope;letter-spacing:.1em;text-transform:uppercase;color:#8fe0a6;padding:16px;\">Student<\u002Fdiv><div style=\"font:700 11px/1 Manrope;letter-spacing:.1em;text-transform:uppercase;color:#8fe0a6;padding:16px;\">Visit<\u002Fdiv><div style=\"font:700 11px/1 Manrope;letter-spacing:.1em;text-transform:uppercase;color:#8fe0a6;padding:16px;\">Business<\u002Fdiv><div style=\"font:700 11px/1 Manrope;letter-spacing:.1em;text-transform:uppercase;color:#8fe0a6;padding:16px;\">Category<\u002Fdiv><div style=\"font:700 11px/1 Manrope;letter-spacing:.1em;text-transform:uppercase;color:#8fe0a6;padding:16px;\">Challenge<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-for list=\"{{ interviews }}\" as=\"i\" hint-placeholder-count=\"8\">\n ransform:uppercase;color:#8fe0a6;\">Submission Review<\u002Fspan>\n            <div style=\"font:600 24px/1.1 'Playfair Display',serif;color:#f4f0e6;margin:9px 0 6px 0;\">Approve or Reject Submissions<\u002Fdiv>\n            <p style=\"font:400 14px/1.5 Manrope;color:#8b8d86;margin:0 0 22px 0;\">Review the problem &amp; solution submission before final publishing.<\u002Fp>\n            <label style=\"display:block;font:500 13px/1 Manrope;color:#9a9c94;margin-bottom:8px;\">Submission<\u002Flabel>\n            <select value=\"{{ rForm.submission }}\" onchange=\"{{ onRsubmission }}\" style=\"width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:14px 15px;color:#f0ece2;font:400 15px Manrope;margin-bottom:18px;\">\n              <option value=\"\">Select submission<\u002Foption>\n              <option value=\"10000001 — Ariana Carter\">10000001 — Ariana Carter<\u002Foption>\n            <\u002Fselect>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;\">\n              <div><label style=\"display:block;font:500 13px/1 Manrope;color:#9a9c94;margin-bottom:8px;\">Status<\u002Flabel>\n                <select value=\"{{ rForm.status }}\" onchange=\"{{ onRstatus }}\" style=\"width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:14px 15px;color:#f0ece2;font:400 15px Manrope;\">\n                  <option value=\"Approved\">Approved<\u002Foption>\n                  <option value=\"Winner\">Winner<\u002Foption>\n                  <option value=\"Pending\">Pending<\u002Foption>\n                  <option value=\"Rejected\">Rejected<\u002Foption>\n                <\u002Fselect>\n              <\u002Fdiv>\n              <div><label style=\"display:block;font:500 13px/1 Manrope;color:#9a9c94;margin-bottom:8px;\">Score<\u002Flabel><input value=\"{{ rForm.score }}\" onchange=\"{{ onRscore }}\" placeholder=\"Optional\" style=\"width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:14px 15px;color:#f0ece2;font:400 15px Manrope;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <label style=\"display:block;font:500 13px/1 Manrope;color:#9a9c94;margin-bottom:8px;\">Rank Position<\u002Flabel>\n            <input value=\"{{ rForm.rank }}\" onchange=\"{{ onRrank }}\" placeholder=\"Optional\" style=\"width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:14px 15px;color:#f0ece2;font:400 15px Manrope;margin-bottom:18px;\">\n            <label style=\"display:block;font:500 13px/1 Manrope;color:#9a9c94;margin-bottom:8px;\">Reviewer Notes<\u002Flabel>\n            <textarea value=\"{{ rForm.notes }}\" onchange=\"{{ onRnotes }}\" placeholder=\"Optional review notes\" style=\"width:100%;min-height:90px;resize:vertical;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:14px 15px;color:#f0ece2;font:400 14px 'JetBrains Mono',monospace;margin-bottom:22px;\"><\u002Ftextarea>\n            <button style=\"width:100%;background:linear-gradient(180deg,#f3dd9b,#cda655);color:#2a2208;border:none;border-radius:13px;padding:16px;font:700 13px/1 Manrope;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;\" onclick=\"{{ saveReview }}\">Save Submission Review<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ALERTS -->\n      <sc-if value=\"{{ isAlerts }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:grid;grid-template-columns:1fr 1.4fr;gap:22px;max-width:1180px;\">\n          <div style=\"border-radius:22px;background:linear-gradient(180deg,rgba(212,175,90,.06),rgba(255,255,255,.008));border:1px solid rgba(212,175,90,.16);padding:26px;height:fit-content;\">\n            <span style=\"font:700 11px/1 Manrope;letter-spacing:.2em;text-transform:uppercase;color:#e7c977;\">School Winners<\u002Fspan>\n            <sc-for list=\"{{ winners }}\" as=\"w\" hint-placeholder-count=\"1\">\n              <div style=\"margin-top:18px;background:rgba(0,0,0,.26);border:1px solid rgba(212,175,90,.2);border-radius:16px;padding:22px;\">\n                <div style=\"display:flex;align-items:center;gap:10px;\">\n                  <span style=\"font:700 13px/1 'Playfair Display',serif;color:#2a2208;background:linear-gradient(180deg,#f3dd9b,#cda655);border-radius:8px;padding:6px 11px;text-transform:capitalize;\">{{ w.place }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font:600 22px/1.1 'Playfair Display',serif;color:#f4f0e6;margin:14px 0 6px 0;\">{{ w.who }}<\u002Fdiv>\n                <div style=\"font:400 12px/1 'JetBrains Mono',monospace;color:#7c7f77;\">{{ w.at }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.008));border:1px solid rgba(255,255,255,.07);padding:26px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;\">\n              <span style=\"font:700 11px/1 Manrope;letter-spacing:.2em;text-transform:uppercase;color:#8fe0a6;\">Notifications<\u002Fspan>\n              <span style=\"{{ unreadStyle }}\">{{ unreadLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"margin-top:16px;display:flex;flex-direction:column;gap:12px;\">\n              <sc-for list=\"{{ notifications }}\" as=\"n\" hint-placeholder-count=\"5\">\n                <div style=\"{{ n.cardStyle }}\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:12px;\">\n                    <div style=\"font:600 16px/1.2 Manrope;color:#eceee4;\">{{ n.title }}<\u002Fdiv>\n                    <span style=\"{{ n.dotStyle }}\"><\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font:400 14px/1.5 Manrope;color:#9a9c94;margin:8px 0 12px 0;\">{{ n.body }}<\u002Fdiv>\n                  <div style=\"display:flex;justify-content:space-between;align-items:center;\">\n                    <span style=\"font:400 12px/1 'JetBrains Mono',monospace;color:#6c6f68;\">{{ n.at }}<\u002Fspan>\n                    <button style=\"{{ n.btnStyle }}\" onclick=\"{{ n.onRead }}\">{{ n.btnLabel }}<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;bottom:28px;right:28px;z-index:50;display:flex;align-items:center;gap:13px;background:linear-gradient(180deg,rgba(18,22,20,.97),rgba(12,14,13,.97));border:1px solid rgba(143,224,166,.35);border-radius:14px;padding:16px 22px;box-shadow:0 18px 50px rgba(0,0,0,.5);animation:toastIn .3s ease both;\">\n      <span style=\"width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(143,224,166,.16);color:#9fe6b4;font:700 16px/1 Manrope;\">✓<\u002Fspan>\n      <span style=\"font:600 14px/1.3 Manrope;color:#eceee4;\">{{ toast.msg }}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900},&quot;defaultTab&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;overview&quot;,&quot;options&quot;:[&quot;overview&quot;,&quot;profile&quot;,&quot;approvals&quot;,&quot;rankings&quot;,&quot;records&quot;,&quot;reviews&quot;,&quot;alerts&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;navStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;numbers&quot;,&quot;options&quot;:[&quot;numbers&quot;,&quot;dots&quot;],&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    tab: this.props.defaultTab || 'overview',\n    recordsTab: 'students',\n    tForm: { teacher: '', status: 'Approved', notes: '', sig: 'Dr. Elena Morris' },\n    sForm: { student: '', status: 'Approved', notes: '', sig: '' },\n    rForm: { submission: '', status: 'Approved', score: '', rank: '', notes: '' },\n    toast: null,\n    read: {},\n  };\n\n  go(key) { this.setState({ tab: key }); }\n  upd(form, field) { return (e) => { const v = e.target.value; this.setState(s => ({ [form]: { ...s[form], [field]: v } })); }; }\n  showToast(msg) { this.setState({ toast: { msg } }); clearTimeout(this._t); this._t = setTimeout(() => this.setState({ toast: null }), 2900); }\n  markRead(id) { this.setState(s => ({ read: { ...s.read, [id]: true } })); }\n\n  badge(status) {\n    const map = {\n      approved: ['#7fd99a', 'rgba(127,217,154,.12)', 'rgba(127,217,154,.3)'],\n      complete: ['#7fd99a', 'rgba(127,217,154,.12)', 'rgba(127,217,154,.3)'],\n      winner: ['#7fd99a', 'rgba(127,217,154,.12)', 'rgba(127,217,154,.3)'],\n      eligible: ['#e7c977', 'rgba(231,201,119,.12)', 'rgba(231,201,119,.32)'],\n      pending: ['#d8a657', 'rgba(216,166,87,.12)', 'rgba(216,166,87,.3)'],\n      locked: ['#9aa0a6', 'rgba(154,160,166,.1)', 'rgba(154,160,166,.22)'],\n      rejected: ['#d98a78', 'rgba(217,138,120,.12)', 'rgba(217,138,120,.3)'],\n    };\n    const k = (status || '').toLowerCase();\n    const c = map[k] || ['#b9bbb2', 'rgba(255,255,255,.06)', 'rgba(255,255,255,.12)'];\n    return `display:inline-block;font:700 11px/1 Manrope;letter-spacing:.06em;text-transform:capitalize;color:${c[0]};background:${c[1]};border:1px solid ${c[2]};border-radius:999px;padding:7px 13px;`;\n  }\n  textColor(status) {\n    const map = { approved: '#7fd99a', complete: '#7fd99a', eligible: '#e7c977', pending: '#d8a657', locked: '#9aa0a6', rejected: '#d98a78' };\n    return 'color:' + (map[(status || '').toLowerCase()] || '#b9bbb2') + ';';\n  }\n  medal(rank) {\n    const m = { 1: ['#e7c977', 'rgba(231,201,119,.18)', 'rgba(231,201,119,.4)'], 2: ['#cfd2d6', 'rgba(207,210,214,.14)', 'rgba(207,210,214,.32)'], 3: ['#cda06a', 'rgba(205,160,106,.16)', 'rgba(205,160,106,.34)'] };\n    const c = m[rank] || ['#9a9c95', 'rgba(255,255,255,.05)', 'rgba(255,255,255,.12)'];\n    return `flex:none;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font:700 16px/1 'Playfair Display',serif;color:${c[0]};background:${c[1]};border:1px solid ${c[2]};`;\n  }\n\n  renderVals() {\n    const tab = this.state.tab;\n    const numbered = (this.props.navStyle || 'numbers') === 'numbers';\n\n    const base = [\n      { key: 'overview', label: 'Overview', sub: 'School summary', hsub: 'Snapshot of school readiness and performance', badge: '' },\n      { key: 'profile', label: 'Profile', sub: 'School identity', hsub: 'School identity and contact details', badge: '' },\n      { key: 'approvals', label: 'Approvals', sub: 'Teacher & student review', hsub: 'Approve or reject teachers and students', badge: '2' },\n      { key: 'rankings', label: 'Rankings', sub: 'Competition board', hsub: 'School-wide and teacher leaderboards', badge: '' },\n      { key: 'records', label: 'Records', sub: 'Students & submissions', hsub: 'All students, interviews and submissions', badge: '' },\n      { key: 'reviews', label: 'Reviews', sub: 'Submission tools', hsub: 'Review submissions before final publishing', badge: '1' },\n      { key: 'alerts', label: 'Alerts', sub: 'Notifications', hsub: 'School notifications and winners', badge: '' },\n    ];\n\n    const navItems = base.map((it, i) => {\n      const active = it.key === tab;\n      const unread = it.key === 'alerts' ? Object.values(this.state.read).filter(Boolean).length : 0;\n      const badgeText = it.key === 'alerts' ? String(7 - unread) : it.badge;\n      return {\n        label: it.label, sub: it.sub,\n        num: numbered ? String(i + 1).padStart(2, '0') : '\\u2022',\n        badge: (it.key === 'alerts' ? (7 - unread > 0) : !!it.badge) ? badgeText : '',\n        onClick: () => this.go(it.key),\n        rowStyle: `position:relative;display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;border:none;border-radius:14px;padding:12px 14px;transition:background .18s ease;${active ? 'background:linear-gradient(90deg,rgba(143,224,166,.1),rgba(212,175,90,.05));box-shadow:inset 0 0 0 1px rgba(212,175,90,.22);' : 'background:transparent;'}`,\n        chipStyle: `flex:none;display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:10px;font:700 12px/1 'JetBrains Mono',monospace;${active ? 'background:linear-gradient(180deg,#f3dd9b,#cda655);color:#2a2208;' : 'background:rgba(255,255,255,.04);color:#9a9c95;border:1px solid rgba(255,255,255,.08);'}`,\n        labelStyle: `font:600 15px/1.1 Manrope;${active ? 'color:#f4f0e6;' : 'color:#c8cabf;'}`,\n        subStyle: `font:500 11px/1.2 Manrope;letter-spacing:.04em;color:${active ? '#8fe0a6' : '#6c6f68'};margin-top:3px;`,\n        badgeStyle: `margin-left:auto;font:700 10px/1 Manrope;color:${active ? '#2a2208' : '#e3bf73'};background:${active ? 'rgba(231,201,119,.85)' : 'rgba(212,175,90,.14)'};border-radius:999px;min-width:20px;text-align:center;padding:5px 7px;`,\n      };\n    });\n\n    const view = base.find(b => b.key === tab) || base[0];\n\n    const stats = [\n      { label: 'Students', value: '3', g: 1 }, { label: 'Parent Pending', value: '1' }, { label: 'Parent Approved', value: '2' }, { label: 'School Pending', value: '1' }, { label: 'School Approved', value: '2' },\n      { label: 'Teacher Pending', value: '1' }, { label: 'Teacher Approved', value: '2' }, { label: 'Eligible', value: '0' }, { label: 'Submissions', value: '1' }, { label: 'Interviews', value: '8' },\n    ].map(s => ({ ...s, valStyle: `font:700 30px/1 'Playfair Display',serif;color:${s.g ? '#9fe6b4' : '#f4f0e6'};margin-top:10px;` }));\n\n    const profileRows = [\n      {
